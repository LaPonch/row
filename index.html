<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Dashboard</title>
<script src="lock.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) 60px max(20px, env(safe-area-inset-left));
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page {
  max-width: 900px;
  margin: 0 auto;
}

.dash-title {
  margin: 0 0 22px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== Bento Grid ===== */
.bento {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  gap: 14px;
  grid-auto-flow: dense;
}

/* Glass tile base */
.tile {
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 18px 20px 16px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.07);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
  text-decoration: none;
  color: inherit;
  overflow: hidden;
  transition:
    transform 0.18s cubic-bezier(0.22, 1, 0.36, 1),
    border-color 0.18s ease,
    box-shadow 0.18s ease;
}
.tile:hover {
  transform: translateY(-3px);
  border-color: color-mix(in srgb, var(--accent) 40%, transparent);
  box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
}

/* Size modifiers */
.tile.big  { grid-column: span 2; grid-row: span 2; }
.tile.wide { grid-column: span 2; }

/* Tile content layout */
.tile-num {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--text-tertiary);
  line-height: 1;
}

.tile-emoji {
  position: absolute;
  top: 16px;
  right: 18px;
  font-size: 26px;
  line-height: 1;
  filter: drop-shadow(0 0 10px color-mix(in srgb, var(--accent) 70%, transparent));
  pointer-events: none;
  user-select: none;
}
.tile.big .tile-emoji { font-size: 38px; top: 18px; right: 22px; }

.tile-spacer { flex: 1; }

.tile-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  line-height: 1.2;
  margin-bottom: 8px;
}
.tile.big .tile-title { font-size: 22px; }

.tile-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.tile-sub {
  font-size: 11px;
  color: var(--text-tertiary);
  line-height: 1.3;
  flex: 1;
}
.tile-arrow {
  font-size: 16px;
  color: var(--accent);
  font-weight: 700;
  line-height: 1;
  transition: transform 0.18s ease;
  flex-shrink: 0;
}
.tile:hover .tile-arrow { transform: translateX(4px); }

/* Subtle inner glow accent on big tile */
.tile.big::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 70% 100%, color-mix(in srgb, var(--accent) 9%, transparent), transparent 55%);
  pointer-events: none;
  border-radius: inherit;
}

/* Responsive */
@media (max-width: 720px) {
  .bento {
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 148px;
  }
  .tile.big { grid-row: span 1; }
}
@media (max-width: 440px) {
  body { padding: max(20px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) 50px max(14px, env(safe-area-inset-left)); }
  .bento {
    grid-template-columns: 1fr;
    grid-auto-rows: 130px;
  }
  .tile.big, .tile.wide { grid-column: span 1; }
}
</style>
</head>
<body>
<div class="page">

  <h1 class="dash-title">Dashboard</h1>

  <div class="bento">

    <!-- 01 Main — big -->
    <a class="tile big" href="main.html" style="--accent:#6BE3A4">
      <div class="tile-num">·01</div>
      <div class="tile-emoji">🏠</div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Main</div>
      <div class="tile-footer">
        <span class="tile-sub">Goals &amp; daily plan</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- 02 Fitness — wide -->
    <a class="tile wide" href="gym.html" style="--accent:#7DD3FC">
      <div class="tile-num">·02</div>
      <div class="tile-emoji">💪</div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Fitness</div>
      <div class="tile-footer">
        <span class="tile-sub">Workouts, splits, sessions</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- 03 Health — small -->
    <a class="tile" href="health.html" style="--accent:#A7F3D0">
      <div class="tile-num">·03</div>
      <div class="tile-emoji">💊</div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Health</div>
      <div class="tile-footer">
        <span class="tile-sub">Supplements &amp; vitals</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- 04 Water — small -->
    <a class="tile" href="po-water.html" style="--accent:#60A5FA">
      <div class="tile-num">·04</div>
      <div class="tile-emoji">💧</div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Water</div>
      <div class="tile-footer">
        <span class="tile-sub">Hydration</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- 05 Finance — wide -->
    <a class="tile wide" href="finance.html" style="--accent:#F2C063">
      <div class="tile-num">·05</div>
      <div class="tile-emoji">📊</div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Finance</div>
      <div class="tile-footer">
        <span class="tile-sub">Net worth &amp; spending</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

  </div>

</div>
</body>
</html>
